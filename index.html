<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace Ledger</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f1f3f4; color: #3c4043; margin: 0; padding: 16px; display: flex; justify-content: center; }
    .card { width: 100%; max-w: 420px; background: #ffffff; border-radius: 8px; border: 1px solid #dadce0; box-shadow: 0 1px 3px rgba(60,64,67,0.2); padding: 24px; box-sizing: border-box; }
    header { text-align: center; border-bottom: 1px solid #e8eaed; padding-bottom: 16px; margin-bottom: 20px; }
    h1 { margin: 0; font-size: 22px; font-weight: 500; color: #1a73e8; }
    p.subtitle { margin: 4px 0 0 0; font-size: 12px; color: #5f6368; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #5f6368; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    select, input { width: 100%; padding: 12px; background-color: #f8f9fa; border: 1px solid #dadce0; border-radius: 4px; font-size: 14px; color: #202124; box-sizing: border-box; }
    select:focus, input:focus { outline: none; border-color: #1a73e8; background-color: #ffffff; }
    .camera-box { background-color: #f8f9fa; border: 2px dashed #dadce0; border-radius: 6px; padding: 20px; text-align: center; margin-top: 8px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background-color: #1a73e8; color: #ffffff; margin-top: 12px; }
    .btn-primary:hover { background-color: #1557b0; }
    .btn-secondary { background-color: #ffffff; color: #3c4043; border: 1px solid #dadce0; width: auto; padding: 8px 16px; font-size: 12px; }
    .btn-maps { background-color: #e8f0fe; color: #1a73e8; padding: 10px; font-size: 12px; margin-bottom: 12px; }
    #map { width: 100%; height: 180px; background-color: #e8eaed; border-radius: 4px; margin-top: 8px; border: 1px solid #dadce0; }
    #distanceOutput { font-size: 14px; font-weight: 700; color: #1a73e8; text-align: center; margin: 10px 0; }
    #fileStatus { font-size: 12px; color: #70757a; font-style: italic; margin-top: 8px; }
  </style>
</head>
<body>

  <div class="card">
    <header>
      <h1>Google Workspace Ledger</h1>
      <p class="subtitle">Direct Business Expense Pipeline</p>
    </header>
    
    <form id="expenseForm">
      <div class="form-group">
        <label>Tax Line / Tab Destination</label>
        <select id="taxLine" onchange="toggleView()">
          <option value="Supplies & Gear (Line 8811)">Supplies & Gear (Line 8811)</option>
          <option value="Software & Subs (Line 9270)">Software & Subs (Line 9270)</option>
          <option value="Office & Printing (Line 8810)">Office & Printing (Line 8810)</option>
          <option value="Education & Certs (Line 8760)">Education & Certs (Line 8760)</option>
          <option value="Insurance (Line 8690)">Insurance (Line 8690)</option>
          <option value="Advertising (Line 8521)">Advertising (Line 8521)</option>
          <option value="Meals & Entertainment (Line 8523)">Meals & Entertainment (Line 8523)</option>
          <option value="Vehicle Mileage (Line 9281)">Vehicle Mileage (Line 9281)</option>
          <option value="Home - Rent / Mortgage Interest">Home - Rent / Mortgage Interest</option>
          <option value="Home - Utilities & Hydro">Home - Utilities & Hydro</option>
          <option value="Home - Internet">Home - Internet</option>
        </select>
      </div>

      <div class="form-group">
        <label>Transaction Date</label>
        <input type="date" id="date">
      </div>

      <div id="financialSection">
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" step="0.01" id="amount" placeholder="0.00" style="font-size: 18px; font-weight: bold;">
        </div>
        <div class="form-group">
          <label>Description / Business Purpose</label>
          <input type="text" id="description" placeholder="e.g., Target cones / track facility fee">
        </div>
        <div class="camera-box">
          <label>Receipt Document / E-Transfer Snap</label>
          <input type="file" id="receiptFile" accept="image/*" style="display: none;">
          <button type="button" class="btn-secondary" onclick="document.getElementById('receiptFile').click()">Open Shutter / Gallery</button>
          <p id="fileStatus">No attachment loaded yet</p>
        </div>
      </div>

      <div id="vehicleSection" style="display: none;">
        <div class="form-group">
          <label>Driving / Business Purpose</label>
          <input type="text" id="vehiclePurpose" placeholder="e.g., Client travel / stadium session commute">
        </div>
        <div class="form-group">
          <label>Start Address</label>
          <input type="text" id="startAddress" placeholder="Origin street address">
        </div>
        <div class="form-group">
          <label>End Address</label>
          <input type="text" id="endAddress" placeholder="Destination street address">
        </div>
        <button type="button" class="btn-maps" onclick="calculateRoute()">Calculate Journey Distance</button>
        <div id="map"></div>
        <div id="distanceOutput"></div>
      </div>

      <button type="button" id="submitBtn" class="btn-primary" onclick="submitData()">Ship To Ledger</button>
    </form>
  </div>

  <script>
    // HARDCONFIG LAYER
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzraw-G0YDsinZdaXL6KPkkwuLUkM5q_G33pKn6bS-_evNcTVn88gxVETY0148PvzyE/exec"; 
    const GOOGLE_MAPS_KEY = "AIzaSyBJonKK-VokewkPepvKEgMrH3b_ZLoGl_8";
    
    let map, directionsService, directionsRenderer, autoStart, autoEnd, distanceKm = 0;

    document.getElementById('date').valueAsDate = new Date();

    function loadMaps() {
      if (window.google && window.google.maps) return initMap();
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_KEY}&libraries=places&callback=initMap`;
      script.async = true;
      document.head.appendChild(script);
    }

    function initMap() {
      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer();
      map = new google.maps.Map(document.getElementById('map'), {
        zoom: 12, center: { lat: 49.2827, lng: -123.1207 }, disableDefaultUI: true
      });
      directionsRenderer.setMap(map);
      autoStart = new google.maps.places.Autocomplete(document.getElementById('startAddress'));
      autoEnd = new google.maps.places.Autocomplete(document.getElementById('endAddress'));
    }

    // Clean JavaScript view toggling that works on any web platform flawlessly
    function toggleView() {
      const selection = document.getElementById("taxLine").value;
      const finForm = document.getElementById("financialSection");
      const vehForm = document.getElementById("vehicleSection");

      if (selection === "Vehicle Mileage (Line 9281)") {
        finForm.style.display = "none";
        vehForm.style.display = "block";
        loadMaps();
      } else {
        finForm.style.display = "block";
        vehForm.style.display = "none";
      }
    }

    document.getElementById('receiptFile').addEventListener('change', function(e) {
      const name = e.target.files[0] ? e.target.files[0].name : "No attachment loaded yet";
      document.getElementById('fileStatus').innerText = "Attached: " + name;
    });

    function calculateRoute() {
      const start = document.getElementById("startAddress").value;
      const end = document.getElementById("endAddress").value;
      if (!start || !end) return alert("Please fill out both address fields.");

      directionsService.route({ origin: start, destination: end, travelMode: 'DRIVING' }, (res, status) => {
        if (status === 'OK') {
          directionsRenderer.setDirections(res);
          distanceKm = (res.routes[0].legs[0].distance.value / 1000).toFixed(2);
          document.getElementById("distanceOutput").innerText = `Distance: ${distanceKm} km`;
        } else {
          alert('Maps routing error: ' + status);
        }
      });
    }

    async function submitData() {
      const btn = document.getElementById("submitBtn");
      const taxLine = document.getElementById("taxLine").value;
      const date = document.getElementById("date").value;
      
      let payload = { taxLine, date };
      btn.innerText = "SHIPPING...";
      btn.disabled = true;

      try {
        if (taxLine === "Vehicle Mileage (Line 9281)") {
          if (distanceKm == 0) throw new Error("Please calculate the journey distance metrics via the map tools first.");
          payload.startAddress = document.getElementById("startAddress").value;
          payload.endAddress = document.getElementById("endAddress").value;
          payload.distance = distanceKm;
          payload.description = document.getElementById("vehiclePurpose").value;
        } else {
          payload.amount = document.getElementById("amount").value;
          payload.description = document.getElementById("description").value;
          if (!payload.amount) throw new Error("Please enter an expense amount.");
          
          const fileInput = document.getElementById("receiptFile");
          if (fileInput.files.length > 0) {
            payload.receiptImage = await new Promise((res) => {
              const reader = new FileReader();
              reader.onloadend = () => res(reader.result);
              reader.readAsDataURL(fileInput.files[0]);
            });
          }
        }

        // Clean, external network request directly to Google Sheets
        await fetch(GOOGLE_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        alert("TRANSMISSION SUCCESSFUL!");
        document.getElementById("expenseForm").reset();
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('fileStatus').innerText = "No attachment loaded yet";
        document.getElementById("distanceOutput").innerText = "";
        distanceKm = 0;

      } catch (err) {
        alert("Error: " + err.message);
      } finally {
        btn.innerText = "SHIP TO LEDGER";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
